name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., patch, minor, major)'
        required: false
        default: 'patch'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
      
      - name: Build
        run: npm run build
      
      - name: Bump version (if workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
      
      - name: Update version in source files (if workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          sed -i "s/const PLUGIN_VERSION = \".*\"/const PLUGIN_VERSION = \"$NEW_VERSION\"/" src/index.ts
          sed -i "s/opencode-qwen-oauth\"] = \".*\"/opencode-qwen-oauth\"] = \"^$NEW_VERSION\"/" bin/install.js
      
      - name: Rebuild after version bump
        if: github.event_name == 'workflow_dispatch'
        run: npm run build
      
      - name: Commit version bump (if workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git add package.json package-lock.json src/index.ts bin/install.js dist/
          git commit -m "v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin main --tags
      
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Create GitHub Release (if workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.NEW_VERSION }}
          release_name: v${{ env.NEW_VERSION }}
          body: |
            Release ${{ env.NEW_VERSION }}
            
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
