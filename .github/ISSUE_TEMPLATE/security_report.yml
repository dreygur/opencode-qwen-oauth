name: 🔒 Security Vulnerability
description: Report a security vulnerability (Use responsibly)
title: "[Security]: "
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **IMPORTANT**: For serious security vulnerabilities, consider reporting privately.
        
        You can use GitHub's private vulnerability reporting feature or contact the maintainer directly.

  - type: textarea
    id: description
    attributes:
      label: Vulnerability Description
      description: Describe the security issue
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What is the potential impact of this vulnerability?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can this vulnerability be reproduced?
    validations:
      required: true

  - type: textarea
    id: fix
    attributes:
      label: Suggested Fix
      description: If you have a suggestion for fixing this, please share it
